<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estudiante – Aula Virtual</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet"/>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F5F8FD">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
<div class="app-layout">

  <header class="app-header">
    <div class="app-header-top">
      <div class="app-header-info">
        <a href="index.html" class="back-link">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Inicio
        </a>
        <h1 id="feedTitle">Mis tareas</h1>
      </div>
      <button class="bell-btn" id="bellBtn" title="Ver pendientes próximas">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="dot" id="bellDot" style="display:none;"></span>
      </button>
    </div>
    <div class="status-line">
      <span class="status-dot" id="dot"></span><span id="statusText">Conectando...</span>
    </div>
    <div class="filter-row">
      <button class="chip active" data-filter="todas">Todas</button>
      <button class="chip" data-filter="pendiente">Pendientes</button>
      <button class="chip" data-filter="entregada">Entregadas</button>
      <button class="chip" data-filter="atrasada">Atrasadas</button>
    </div>
  </header>

  <div class="new-post-alert" id="newAlert">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    Nueva tarea del profesor
  </div>

  <main class="feed-area" id="feed">
    <div class="loading-spinner">
      <div class="spinner"></div>
      <span>Conectando con la clase...</span>
    </div>
  </main>

</div>

<!-- PANEL DE DETALLE -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, getDoc, setDoc, updateDoc, increment, onSnapshot, orderBy, query, limit, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ============================================================
  //  CLOUDINARY — necesario para que el alumno adjunte archivos
  //  (mismo Cloud name y preset que configuraste en profesor.html)
  // ============================================================
  const CLOUDINARY_CLOUD_NAME = "TU_CLOUD_NAME";
  const CLOUDINARY_UPLOAD_PRESET = "TU_UPLOAD_PRESET";
  // ============================================================

  const firebaseConfig = {
    apiKey: "AIzaSyBynAiyunaie-L49lT_mJ3W7SiQRB9sDVw",
    authDomain: "clases-68cf1.firebaseapp.com",
    projectId: "clases-68cf1",
    storageBucket: "clases-68cf1.firebasestorage.app",
    messagingSenderId: "734322078138",
    appId: "1:734322078138:web:66ddaaab8b05ffe1996d83"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const feed        = document.getElementById('feed');
  const dot         = document.getElementById('dot');
  const statusText  = document.getElementById('statusText');
  const newAlert    = document.getElementById('newAlert');
  const toast       = document.getElementById('toast');
  const bellBtn     = document.getElementById('bellBtn');
  const bellDot     = document.getElementById('bellDot');
  const feedTitle   = document.getElementById('feedTitle');
  const detailOverlay = document.getElementById('detailOverlay');
  const detailPanel   = document.getElementById('detailPanel');

  let tareasCache = [];
  let activeFilter = 'todas';
  let isFirstLoad = true;
  let knownIds = new Set();

  // ---------- Almacenamiento local (sin cuentas de alumno) ----------
  const misEntregas = JSON.parse(localStorage.getItem('av_entregas') || '{}');
  function guardarEntregaLocal(tareaId, info) {
    misEntregas[tareaId] = info;
    localStorage.setItem('av_entregas', JSON.stringify(misEntregas));
  }
  function getNombreGuardado() { return localStorage.getItem('av_nombre') || ''; }
  function guardarNombre(n) { localStorage.setItem('av_nombre', n); }

  newAlert.addEventListener('click', () => {
    feed.scrollTo({ top: 0, behavior: 'smooth' });
    newAlert.classList.remove('visible');
  });

  bellBtn.addEventListener('click', () => setFilter('pendiente'));

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => setFilter(chip.dataset.filter));
  });
  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
    render();
  }

  // ---------- Firestore realtime ----------
  const q = query(collection(db, 'tareas'), orderBy('timestamp', 'desc'), limit(50));
  onSnapshot(q, (snapshot) => {
    dot.classList.add('online');
    statusText.textContent = 'En línea';

    const newIds = new Set(snapshot.docs.map(d => d.id));
    let hayNuevas = false;
    if (!isFirstLoad) newIds.forEach(id => { if (!knownIds.has(id)) hayNuevas = true; });
    knownIds = newIds;

    tareasCache = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    render();

    if (hayNuevas && feed.scrollTop > 100) {
      newAlert.classList.add('visible');
      setTimeout(() => newAlert.classList.remove('visible'), 5000);
    }
    isFirstLoad = false;
  }, () => {
    dot.classList.remove('online');
    statusText.textContent = 'Sin conexión';
    feed.innerHTML = `<div class="empty-feed"><div class="empty-icon">${iconWifiOff()}</div><p class="empty-title">Sin conexión</p><p>Verifica tu internet e intenta de nuevo.</p></div>`;
  });

  function statusOf(tarea) {
    if (misEntregas[tarea.id]) return 'entregada';
    if (tarea.fecha && new Date(tarea.fecha + 'T23:59:59') < new Date()) return 'atrasada';
    return 'pendiente';
  }
  function isUrgente(tarea) {
    if (!tarea.fecha) return false;
    const diff = (new Date(tarea.fecha + 'T23:59:59') - new Date()) / 86400000;
    return diff >= 0 && diff <= 2;
  }

  function render() {
    const pendientesCount = tareasCache.filter(t => statusOf(t) === 'pendiente').length;
    feedTitle.textContent = pendientesCount > 0 ? `${pendientesCount} tarea${pendientesCount === 1 ? '' : 's'} pendiente${pendientesCount === 1 ? '' : 's'}` : 'Mis tareas';
    const urgentes = tareasCache.some(t => statusOf(t) === 'pendiente' && isUrgente(t));
    bellDot.style.display = urgentes ? 'block' : 'none';

    const visibles = tareasCache.filter(t => activeFilter === 'todas' || statusOf(t) === activeFilter);

    if (tareasCache.length === 0) {
      feed.innerHTML = `<div class="empty-feed"><div class="empty-icon">${iconClock()}</div><p class="empty-title">Esperando tareas</p><p>Cuando tu profesor publique algo, aparecerá aquí al instante.</p></div>`;
      return;
    }
    if (visibles.length === 0) {
      feed.innerHTML = `<div class="empty-feed"><div class="empty-icon">${iconCheck()}</div><p class="empty-title">Nada por aquí</p><p>No tienes tareas en esta categoría.</p></div>`;
      return;
    }

    feed.innerHTML = '';
    visibles.forEach((t, i) => {
      const st = statusOf(t);
      const urgente = st === 'pendiente' && isUrgente(t);
      const railState = st === 'entregada' ? 'entregada' : st === 'atrasada' ? 'atrasada' : (urgente ? 'urgente' : 'pendiente');
      const tagClass = { pendiente: 'tag-azul', urgente: 'tag-sol', entregada: 'tag-menta', atrasada: 'tag-coral' }[railState];

      const card = document.createElement('div');
      card.className = `task-card state-${railState}`;
      card.style.animationDelay = `${Math.min(i, 6) * 0.04}s`;
      card.tabIndex = 0;
      card.innerHTML = `
        <div class="rail"></div>
        <div class="task-icon ${tagClass}">${iconTask()}</div>
        <div class="task-body">
          <div class="task-top-row">
            <div class="task-title">${escapeHTML(t.titulo)}</div>
          </div>
          <div class="task-teacher">Prof. ${escapeHTML(t.profesor || 'Profesor')}</div>
          ${t.descripcion ? `<div class="task-desc">${escapeHTML(t.descripcion)}</div>` : ''}
          <div class="task-meta-row">
            <span class="due-chip ${urgente ? 'urgente' : ''} ${st === 'atrasada' ? 'atrasada' : ''}">${iconCalendarSm()} ${formatDueLabel(t.fecha, st)}</span>
            <span class="status-pill ${st}"><span class="pdot"></span>${labelEstado(st)}</span>
          </div>
        </div>
      `;
      card.addEventListener('click', () => openDetail(t));
      card.addEventListener('keydown', e => { if (e.key === 'Enter') openDetail(t); });
      feed.appendChild(card);
    });
  }

  function labelEstado(st) { return { pendiente: 'Pendiente', entregada: 'Entregada', atrasada: 'Atrasada' }[st]; }

  function formatDueLabel(iso, st) {
    if (!iso) return 'Sin fecha';
    const diffDays = Math.round((new Date(iso + 'T00:00:00') - new Date(new Date().toDateString())) / 86400000);
    if (st === 'atrasada') return `Venció el ${formatFecha(iso)}`;
    if (diffDays === 0) return 'Entrega hoy';
    if (diffDays === 1) return 'Entrega mañana';
    if (diffDays > 1) return `En ${diffDays} días`;
    return formatFecha(iso);
  }
  function formatFecha(iso) {
    const [y,m,d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  // ---------- Panel de detalle ----------
  function openDetail(tarea) {
    const st = statusOf(tarea);
    const yaEntregada = !!misEntregas[tarea.id];
    const local = misEntregas[tarea.id];

    detailPanel.innerHTML = `
      <div class="detail-handle"></div>
      <button class="detail-close" id="detailCloseBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <div class="detail-tag-row"><span class="status-pill ${st}"><span class="pdot"></span>${labelEstado(st)}</span></div>
      <div class="detail-title">${escapeHTML(tarea.titulo)}</div>
      <div class="detail-meta">
        <span>Prof. ${escapeHTML(tarea.profesor || 'Profesor')}</span>
        <span class="sep"></span>
        <span>${formatDueLabel(tarea.fecha, st)}</span>
      </div>
      <div class="detail-desc">${escapeHTML(tarea.descripcion) || 'Sin descripción adicional.'}</div>

      ${tarea.archivo ? `
      <div class="detail-section">
        <div class="detail-section-title">Material del profesor</div>
        <a class="file-chip" href="${tarea.archivo.url}" target="_blank" rel="noopener">
          <span class="file-icon">${iconFile()}</span>
          <span class="file-name">${escapeHTML(tarea.archivo.nombre)}</span>
          <span class="file-go">${iconExternal()}</span>
        </a>
      </div>` : ''}

      <div class="detail-section">
        <div class="detail-section-title">Tu entrega</div>
        ${yaEntregada ? `
          <div class="submitted-note">${iconCheck()} Ya entregaste esta tarea</div>
          ${local && local.archivoUrl ? `
          <a class="file-chip" style="margin-top:0.6rem;" href="${local.archivoUrl}" target="_blank" rel="noopener">
            <span class="file-icon">${iconFile()}</span>
            <span class="file-name">${escapeHTML(local.archivoNombre || 'Tu archivo')}</span>
            <span class="file-go">${iconExternal()}</span>
          </a>` : ''}
          <button class="toggle-btn" id="reenviarBtn" style="margin-top:0.9rem;">Volver a entregar</button>
        ` : `
          <input type="text" class="name-input" id="entregaNombre" placeholder="Tu nombre" value="${escapeAttr(getNombreGuardado())}" />
          <label class="upload-zone" id="entregaDropZone" style="margin-bottom:1rem;">
            <div class="upload-icon">${iconUpload()}</div>
            <div class="upload-text" id="entregaUploadLabel">Adjuntar archivo (opcional)</div>
            <div class="upload-sub">PDF, imagen o documento · máx. 10 MB</div>
            <input type="file" id="entregaArchivo" />
          </label>
          <button class="btn-primary" id="entregaSubmitBtn">${iconSend()} Enviar tarea</button>
        `}
      </div>
    `;

    detailOverlay.classList.add('open');
    document.getElementById('detailCloseBtn').addEventListener('click', closeDetail);

    if (yaEntregada) {
      const reenviarBtn = document.getElementById('reenviarBtn');
      reenviarBtn?.addEventListener('click', () => {
        delete misEntregas[tarea.id];
        openDetail(tarea);
      });
    } else {
      const dz = document.getElementById('entregaDropZone');
      const fileInput = document.getElementById('entregaArchivo');
      const label = document.getElementById('entregaUploadLabel');
      fileInput.addEventListener('change', () => {
        label.textContent = fileInput.files[0] ? fileInput.files[0].name : 'Adjuntar archivo (opcional)';
      });
      document.getElementById('entregaSubmitBtn').addEventListener('click', () => enviarTarea(tarea));
    }
  }

  function closeDetail() { detailOverlay.classList.remove('open'); }
  detailOverlay.addEventListener('click', (e) => { if (e.target === detailOverlay) closeDetail(); });

  async function enviarTarea(tarea) {
    const nombreInput = document.getElementById('entregaNombre');
    const fileInput = document.getElementById('entregaArchivo');
    const btn = document.getElementById('entregaSubmitBtn');
    const nombre = nombreInput.value.trim();

    if (!nombre) { showToast('Escribe tu nombre primero', 'error'); nombreInput.focus(); return; }

    btn.disabled = true;
    btn.textContent = 'Enviando...';

    try {
      let archivo = null;
      if (fileInput.files[0]) {
        if (CLOUDINARY_CLOUD_NAME === 'TU_CLOUD_NAME') throw new Error('Cloudinary sin configurar');
        const form = new FormData();
        form.append('file', fileInput.files[0]);
        form.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`, { method: 'POST', body: form });
        if (!res.ok) throw new Error('Error subiendo el archivo');
        const data = await res.json();
        archivo = { url: data.secure_url, nombre: fileInput.files[0].name };
      }

      guardarNombre(nombre);
      const slug = (nombre.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')) || 'alumno';
      const entregaRef = doc(db, 'tareas', tarea.id, 'entregas', slug);
      const existing = await getDoc(entregaRef);
      await setDoc(entregaRef, { nombre, archivo, timestamp: serverTimestamp() });
      if (!existing.exists()) {
        await updateDoc(doc(db, 'tareas', tarea.id), { entregasCount: increment(1) });
      }

      guardarEntregaLocal(tarea.id, { archivoUrl: archivo?.url || null, archivoNombre: archivo?.nombre || null });
      showToast('Tarea entregada correctamente', 'success');
      closeDetail();
      render();
    } catch (err) {
      console.error(err);
      showToast('No se pudo enviar. Intenta de nuevo', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = `${iconSend()} Enviar tarea`;
    }
  }

  // ---------- Utilidades ----------
  function escapeHTML(str) { return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escapeAttr(str) { return escapeHTML(str).replace(/"/g,'&quot;'); }
  function showToast(msg, type = '') {
    toast.textContent = msg;
    toast.className = `toast show ${type}`;
    setTimeout(() => toast.className = 'toast', 3000);
  }

  function iconTask() { return '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>'; }
  function iconCalendarSm() { return '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>'; }
  function iconCheck() { return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'; }
  function iconClock() { return '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>'; }
  function iconWifiOff() { return '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>'; }
  function iconFile() { return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>'; }
  function iconExternal() { return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6M10 14 21 3"/></svg>'; }
  function iconUpload() { return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/></svg>'; }
  function iconSend() { return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z"/></svg>'; }
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
