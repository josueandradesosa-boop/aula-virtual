<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profesor – Aula Virtual Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f3f4f6;
      color: #1f2937;
      margin: 0; padding: 0;
    }

    /* Pantalla de login */
    .login-screen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; align-items: center; justify-content: center; z-index: 999; padding: 1.5rem;
    }
    .login-box {
      background: rgba(255, 255, 255, 0.95); border-radius: 24px; padding: 3rem 2rem;
      width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
    }
    .login-box i { font-size: 3rem; color: #4f46e5; margin-bottom: 1rem; }
    .login-box h2 { font-size: 1.6rem; font-weight: 700; color: #1e1b4b; margin-bottom: 0.5rem; }
    .login-box p { color: #6b7280; margin-bottom: 2rem; }
    .login-box input {
      width: 100%; box-sizing: border-box; background: #f9fafb; border: 2px solid #e5e7eb;
      border-radius: 12px; color: #1f2937; font-size: 1.1rem; padding: 0.85rem; text-align: center; margin-bottom: 1.2rem; outline: none;
    }
    .login-box input:focus { border-color: #4f46e5; background: #ffffff; }
    .login-btn {
      width: 100%; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white; border: none; border-radius: 12px; padding: 0.9rem; font-size: 1.1rem; font-weight: 600; cursor: pointer;
    }
    .login-error { color: #ef4444; font-size: 0.9rem; margin-top: 0.9rem; display: none; }

    /* Aplicación Principal */
    .app-layout { max-width: 600px; margin: 0 auto; background: #f9fafb; min-height: 100vh; display: flex; flex-direction: column; }
    .app-header { background: white; padding: 1.25rem 1.5rem; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .back-link { color: #4f46e5; text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 0.5rem; }
    .app-header h1 { font-size: 1.2rem; font-weight: 700; margin: 0; color: #111827; }
    .badge-teacher { background: #e0e7ff; color: #4f46e5; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.8rem; font-weight: 600; }

    /* Feed de publicaciones */
    .feed-area { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.2rem; padding-bottom: 280px; }
    .post-card { background: white; border-radius: 18px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #f3f4f6; }
    .post-meta { display: flex; justify-content: space-between; margin-bottom: 0.75rem; font-size: 0.85rem; color: #6b7280; }
    .post-text { font-size: 0.98rem; line-height: 1.5; color: #374151; margin-bottom: 0.75rem; white-space: pre-wrap; }
    
    /* Imagen dentro del post */
    .post-img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 12px; margin-top: 0.5rem; border: 1px solid #e5e7eb; }

    /* Creador de Tareas Fijo Inferior */
    .composer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: white; box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.1); border-top: 1px solid #e5e7eb; padding: 1.2rem; box-sizing: border-box; border-radius: 24px 24px 0 0; z-index: 40; }
    
    /* CAMBIO CRÍTICO: Forzar fondo blanco puro y letras negro oscuro al escribir */
    .composer textarea { 
      width: 100%; box-sizing: border-box; height: 80px; 
      border: 2px solid #e5e7eb; border-radius: 12px; padding: 0.75rem; 
      font-family: 'Poppins', sans-serif; font-size: 1rem; resize: none; outline: none; 
      background: #ffffff !important; color: #000000 !important; 
    }
    .composer textarea:focus { border-color: #4f46e5; }
    
    /* Vista previa de imagen antes de subir */
    .preview-box { display: none; align-items: center; gap: 1rem; margin-top: 0.5rem; background: #f3f4f6; padding: 0.5rem; border-radius: 12px; }
    .preview-box img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
    .preview-box span { font-size: 0.85rem; color: #10b981; font-weight: 500; }

    .composer-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem; }
    .file-upload-label { display: inline-flex; align-items: center; gap: 0.5rem; background: #f3f4f6; color: #4b5563; padding: 0.6rem 1rem; border-radius: 10px; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
    .publish-btn { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; border: none; border-radius: 10px; padding: 0.6rem 1.5rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1f2937; color: white; padding: 0.75rem 1.5rem; border-radius: 50px; font-size: 0.9rem; transition: transform 0.3s; z-index: 1000; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .loading-spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem; color: #6b7280; }
    .spinner { width: 35px; height: 35px; border: 4px solid rgba(79, 70, 229, 0.1); border-left-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <i class="fa-solid fa-user-tie"></i>
    <h2>Acceso del Profesor</h2>
    <p>Ingresa la contraseña para continuar</p>
    <input type="password" id="passInput" placeholder="Contraseña" autocomplete="off" />
    <button class="login-btn" id="loginBtn">Entrar al Aula</button>
    <div class="login-error" id="loginError">❌ Contraseña incorrecta</div>
  </div>
</div>

<div class="app-layout" id="appContent" style="display:none;">
  <header class="app-header">
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Inicio</a>
    <h1>Panel Escolar</h1>
    <span class="badge-teacher">Profesor</span>
  </header>

  <main class="feed-area" id="feed">
    <div class="loading-spinner"><div class="spinner"></div><span>Cargando aula virtual...</span></div>
  </main>

  <div class="composer">
    <textarea id="msgInput" placeholder="Escribe la tarea o un anuncio aquí..." maxlength="2000" style="color: #000000 !important; background: #ffffff !important;"></textarea>
    
    <div class="preview-box" id="previewBox">
      <img src="" id="imgPreview" alt="Preview"/>
      <span id="uploadStatus">Cargando imagen...</span>
    </div>

    <div class="composer-actions">
      <label class="file-upload-label">
        <i class="fa-solid fa-image"></i>
        <span id="uploadLabelText">Subir Foto</span>
        <input type="file" id="fileInput" accept="image/*" style="display: none;" />
      </label>
      <button class="publish-btn" id="publishBtn"><i class="fa-solid fa-paper-plane"></i> Publicar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, orderBy, query, limit, doc, setDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const CONTRASENA = "josue1226";
  const CLOUD_NAME = "vtbcwe90"; 

  let urlArchivoAdjunto = ""; 
  let profIdLog = "profesor_principal";
  let profAsistId = "";

  const loginScreen = document.getElementById('loginScreen');
  const appContent  = document.getElementById('appContent');
  const passInput   = document.getElementById('passInput');
  const loginBtn    = document.getElementById('loginBtn');
  const loginError  = document.getElementById('loginError');

  const firebaseConfig = {
    apiKey: "AIzaSyBynAiyunaie-L49lT_mJ3W7SiQRB9sDVw",
    authDomain: "clases-68cf1.firebaseapp.com",
    projectId: "clases-68cf1",
    storageBucket: "clases-68cf1.firebasestorage.app",
    messagingSenderId: "734322078138",
    appId: "1:734322078138:web:66ddaaab8b05ffe1996d83"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  if (sessionStorage.getItem('profe_auth') === 'ok') {
    profAsistId = localStorage.getItem('prof_asist_id') || `asist_prof_${Date.now()}`;
    mostrarApp();
  }

  loginBtn.addEventListener('click', verificar);
  passInput.addEventListener('keydown', e => { if (e.key === 'Enter') verificar(); });

  async function verificar() {
    if (passInput.value === CONTRASENA) {
      sessionStorage.setItem('profe_auth', 'ok');
      profAsistId = `asist_prof_${Date.now()}`;
      localStorage.setItem('prof_asist_id', profAsistId);

      await setDoc(doc(db, 'usuarios', profIdLog), { nombre: 'Profesor Principal', rol: 'profesor', estado: 'online' }, { merge: true });
      await setDoc(doc(db, 'asistencia', profAsistId), { nombre: 'Profesor Principal', rol: 'profesor', entrada: serverTimestamp(), salida: null });

      mostrarApp();
    } else {
      loginError.style.display = 'block';
      setTimeout(() => loginError.style.display = 'none', 3000);
    }
  }

  function mostrarApp() {
    loginScreen.style.display = 'none';
    appContent.style.display  = 'flex';
    iniciarFirebase();
  }

  window.addEventListener('beforeunload', () => {
    const aId = profAsistId || localStorage.getItem('prof_asist_id');
    if(db) {
      setDoc(doc(db, 'usuarios', profIdLog), { estado: 'offline' }, { merge: true });
      if(aId) setDoc(doc(db, 'asistencia', aId), { salida: serverTimestamp() }, { merge: true });
    }
  });

  function iniciarFirebase() {
    const feed = document.getElementById('feed');
    const msgInput = document.getElementById('msgInput');
    const publishBtn = document.getElementById('publishBtn');
    const toast = document.getElementById('toast');
    const fileInput = document.getElementById('fileInput');
    const previewBox = document.getElementById('previewBox');
    const imgPreview = document.getElementById('imgPreview');
    const uploadStatus = document.getElementById('uploadStatus');
    const uploadLabelText = document.getElementById('uploadLabelText');

    // Subida de foto a Cloudinary con vista previa en vivo
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0]; if (!file) return;

      // Mostrar contenedor de vista previa local inmediatamente
      previewBox.style.display = "flex";
      imgPreview.src = URL.createObjectURL(file);
      uploadStatus.textContent = "📤 Subiendo foto...";
      uploadStatus.style.color = "#4f46e5";

      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', 'ly4qtjvl'); 

      try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
        const data = await res.json();
        if (data.secure_url) {
          urlArchivoAdjunto = data.secure_url;
          uploadStatus.style.color = "#10b981";
          uploadStatus.textContent = "📸 Foto lista para publicar";
          uploadLabelText.textContent = "Cambiar Foto";
        } else { throw new Error("Error Cloudinary"); }
      } catch (err) {
        uploadStatus.style.color = "#ef4444";
        uploadStatus.textContent = "❌ Error al cargar foto";
      }
    });

    // Publicar Tarea
    publishBtn.addEventListener('click', async () => {
      const text = msgInput.value.trim();
      if (!text && !urlArchivoAdjunto) { showToast('Escribe algo o sube una foto primero'); return; }
      
      publishBtn.disabled = true;
      
      try {
        await addDoc(collection(db, 'publicaciones'), { texto: text, autor: 'Profesor', archivoUrl: urlArchivoAdjunto, timestamp: serverTimestamp() });
        msgInput.value = ''; urlArchivoAdjunto = ""; previewBox.style.display = "none";
        uploadLabelText.textContent = "Subir Foto"; fileInput.value = "";
        showToast('✅ Publicado con éxito!');
      } catch (err) { showToast('Error al publicar'); }
      finally { publishBtn.disabled = false; }
    });

    // Feed en tiempo real con render de imagen directo
    const q = query(collection(db, 'publicaciones'), orderBy('timestamp', 'desc'), limit(50));
    onSnapshot(q, (snapshot) => {
      if (snapshot.empty) {
        feed.innerHTML = `<div style="text-align:center; padding:3rem; color:#9ca3af;">Aún no has publicado nada.</div>`; return;
      }
      feed.innerHTML = '';
      snapshot.forEach(doc => {
        const d = doc.data();
        const time = d.timestamp?.toDate ? d.timestamp.toDate().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' }) : 'Ahora';
        const card = document.createElement('div'); card.className = 'post-card';
        
        // Si hay link de archivo/foto, lo pintamos directo como una imagen visible
        let mediaHtml = d.archivoUrl ? `<img src="${d.archivoUrl}" class="post-img" alt="Material" onclick="window.open('${d.archivoUrl}', '_blank')"/>` : "";
        
        card.innerHTML = `<div class="post-meta"><span><i class="fa-solid fa-user-tie"></i> ${d.autor}</span><span><i class="fa-regular fa-clock"></i> ${time}</span></div><p class="post-text">${escapeHTML(d.texto)}</p>${mediaHtml}`;
        feed.appendChild(card);
      });
    });

    function escapeHTML(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function showToast(msg) { toast.textContent = msg; toast.className = 'toast show'; setTimeout(() => toast.className = 'toast', 3000); }
  }
</script>
</body>
</html>
