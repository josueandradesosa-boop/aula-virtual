<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aula Virtual</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet"/>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F5F8FD">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body class="home-body">
  <div class="home-container">
    <div class="home-header">
      <div class="logo-icon">📡</div>
      <h1>Aula Virtual</h1>
      <p>Conecta profesores y estudiantes en tiempo real</p>
    </div>
    <div class="role-cards">
      <a href="profesor.html" class="role-card teacher-card">
        <div class="card-icon">🧑‍🏫</div>
        <div class="card-body">
          <h2>Soy Profesor</h2>
          <p>Publica tareas para tu clase</p>
        </div>
        <span class="card-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </span>
      </a>
      <a href="estudiante.html" class="role-card student-card">
        <div class="card-icon">🎓</div>
        <div class="card-body">
          <h2>Soy Estudiante</h2>
          <p>Ve tus tareas y entrega tus trabajos</p>
        </div>
        <span class="card-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </span>
      </a>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then((reg) => console.log('Service Worker registrado:', reg.scope))
          .catch((err) => console.error('Error registrando SW:', err));
      });
    }
  </script>
</body>
</html>
