<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aula Virtual – Acceso Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  
  <style>
    /* DISEÑO PREMIUM Y ADAPTABLE PARA LA PORTADA */
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
      box-sizing: border-box !important;
    }

    body {
      font-family: 'Poppins', sans-serif !important;
      background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #1e1b4b) !important;
      background-size: 400% 400% !important;
      animation: portGradiente 12s ease infinite !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      position: relative !important;
      overflow: hidden !important;
      padding: 1rem !important;
    }

    @keyframes portGradiente {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Globos flotantes decorativos en el fondo */
    .p-globo {
      position: absolute !important;
      border-radius: 50% !important;
      background: rgba(255, 255, 255, 0.03) !important;
      backdrop-filter: blur(5px) !important;
      -webkit-backdrop-filter: blur(5px) !important;
      animation: portFlotar 8s infinite ease-in-out !important;
      pointer-events: none !important;
      z-index: 1 !important;
    }
    .g1 { width: 140px !important; height: 140px !important; top: 10% !important; left: 10% !important; }
    .g2 { width: 220px !important; height: 220px !important; bottom: 5% !important; right: -5% !important; animation-delay: 2s !important; }

    @keyframes portFlotar {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    /* Pantallas contenedoras */
    .role-screen, .register-screen {
      width: 100% !important;
      max-width: 440px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      z-index: 10 !important;
    }

    /* Ocultar inicialmente la pantalla de registro por CSS */
    .register-screen {
      display: none !important;
    }

    /* Tarjetas principales de contenido */
    .role-box, .register-box {
      background: rgba(255, 255, 255, 0.94) !important;
      backdrop-filter: blur(10px) !important;
      -webkit-backdrop-filter: blur(10px) !important;
      border: 1px solid rgba(255, 255, 255, 0.6) !important;
      border-radius: 28px !important;
      padding: 2.5rem 2rem !important;
      width: 100% !important;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
      text-align: center !important;
    }

    .role-box h2, .register-box h2 {
      font-size: 1.8rem !important;
      color: #0f172a !important;
      margin: 0 0 0.5rem 0 !important;
      font-weight: 700 !important;
    }

    .role-box p, .register-box p {
      color: #475569 !important;
      font-size: 0.9rem !important;
      margin: 0 0 2rem 0 !important;
    }

    /* Opciones de rol */
    .role-options {
      display: flex !important;
      flex-direction: column !important;
      gap: 1rem !important;
      width: 100% !important;
    }

    /* BOTONES DE LA PORTADA */
    .port-btn {
      display: flex !important;
      align-items: center !important;
      gap: 1rem !important;
      padding: 1.2rem !important;
      border: 2px solid #e2e8f0 !important;
      border-radius: 18px !important;
      background: #ffffff !important;
      cursor: pointer !important;
      text-align: left !important;
      width: 100% !important;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05) !important;
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) !important;
    }

    .port-btn:hover {
      transform: translateY(-4px) !important;
    }

    .port-btn.student-opt:hover {
      border-color: #3b82f6 !important;
      box-shadow: 0 12px 20px rgba(59, 130, 246, 0.15) !important;
    }

    .port-btn.teacher-opt:hover {
      border-color: #7c3aed !important;
      box-shadow: 0 12px 20px rgba(124, 58, 237, 0.15) !important;
    }

    .port-btn i {
      font-size: 1.8rem !important;
      transition: transform 0.3s ease !important;
      width: 40px !important;
      text-align: center !important;
    }
    .port-btn.student-opt i { color: #3b82f6 !important; }
    .port-btn.teacher-opt i { color: #7c3aed !important; }

    .port-btn:hover i {
      transform: scale(1.15) !important;
    }

    .btn-text {
      display: flex !important;
      flex-direction: column !important;
      text-align: left !important;
    }

    .btn-text h3 {
      margin: 0 !important;
      font-size: 1.05rem !important;
      color: #0f172a !important;
      font-weight: 600 !important;
    }

    .btn-text p {
      margin: 0 !important;
      font-size: 0.8rem !important;
      color: #64748b !important;
      line-height: 1.3 !important;
    }

    /* Enlace del panel de control */
    .admin-secret-link {
      display: inline-block !important;
      margin-top: 1.8rem !important;
      color: #64748b !important;
      text-decoration: none !important;
      font-size: 0.85rem !important;
      font-weight: 500 !important;
      transition: color 0.2s !important;
    }
    .admin-secret-link:hover { color: #4f46e5 !important; }

    /* Inputs del formulario de registro */
    .register-box input, .register-box select {
      width: 100% !important;
      box-sizing: border-box !important;
      background: #f8fafc !important;
      border: 2px solid #e2e8f0 !important;
      border-radius: 12px !important;
      padding: 0.8rem !important;
      font-family: 'Poppins', sans-serif !important;
      font-size: 0.95rem !important;
      outline: none !important;
      margin-bottom: 1rem !important;
      color: #0f172a !important;
    }
    .register-box input:focus, .register-box select:focus { border-color: #3b82f6 !important; background: white !important; }

    .btn-enter {
      width: 100% !important;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%) !important;
      color: white !important;
      border: none !important;
      border-radius: 12px !important;
      padding: 0.9rem !important;
      font-size: 1rem !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3) !important;
    }
    .btn-back { display: block !important; margin-top: 1rem !important; color: #64748b !important; text-decoration: none !important; font-size: 0.85rem !important; cursor: pointer !important; }

    .detected-account-box {
      background: #eff6ff !important;
      border: 1px solid #bfdbfe !important;
      border-radius: 12px !important;
      padding: 1rem !important;
      margin-bottom: 1.2rem !important;
      text-align: left !important;
    }
    .detected-account-box p { margin: 0 0 0.5rem 0 !important; font-size: 0.8rem !important; color: #1e40af !important; }
    .detected-account-box strong { color: #1e3a8a !important; display: block !important; font-size: 0.95rem !important; }
    .btn-reset-register { background: none !important; border: none !important; color: #ef4444 !important; text-decoration: underline !important; font-size: 0.8rem !important; cursor: pointer !important; padding: 0 !important; margin-top: 0.5rem !important; }
  </style>
</head>
<body>

<div class="p-globo g1"></div>
<div class="p-globo g2"></div>

<div class="role-screen" id="roleScreen">
  <div class="role-box">
    <h2>¡Bienvenido al Aula Virtual!</h2>
    <p>Por favor, selecciona tu rol para ingresar al portal</p>
    
    <div class="role-options">
      <button class="port-btn student-opt" id="chooseStudent">
        <i class="fa-solid fa-user-graduate"></i>
        <div class="btn-text">
          <h3>Soy Estudiante</h3>
          <p>Ver mis tareas, comunicados y descargar materiales</p>
        </div>
      </button>

      <button class="port-btn teacher-opt" id="chooseTeacher">
        <i class="fa-solid fa-user-tie"></i>
        <div class="btn-text">
          <h3>Soy Profesor</h3>
          <p>Subir asignaciones, adjuntar archivos y panel de control</p>
        </div>
      </button>
    </div>

    <a href="admin.html" class="admin-secret-link"><i class="fa-solid fa-gear"></i> Panel de Control</a>
  </div>
</div>

<div class="register-screen" id="registerScreen">
  <div class="register-box">
    <i class="fa-solid fa-graduation-cap" style="font-size: 2.5rem; color: #3b82f6; margin-bottom: 1rem;"></i>
    <h2>Identificación de Alumno</h2>
    <p>Ingresa tus datos reales para pasar asistencia</p>

    <div id="detectedAccount" class="detected-account-box" style="display: none;">
      <p>Detectamos un registro guardado:</p>
      <strong id="detectedDetails">Nombre (Curso)</strong>
      <button type="button" class="btn-reset-register" id="btnResetRegister">❌ Borrar y registrar otro alumno</button>
    </div>
    
    <div id="registerFields">
      <input type="text" id="studentName" placeholder="Nombre y Apellido completo" autocomplete="off" />
      
      <select id="studentCourse">
        <option value="" disabled selected>Selecciona tu Curso</option>
        <option value="1er Grado">1er Grado</option>
        <option value="2do Grado">2do Grado</option>
        <option value="3er Grado">3er Grado</option>
        <option value="4to Grado">4to Grado</option>
        <option value="5to Grado">5to Grado</option>
        <option value="6to Grado">6to Grado</option>
      </select>
      
      <input type="number" id="studentList" placeholder="Número de Lista" min="1" max="50" autocomplete="off" />
    </div>
    
    <button class="btn-enter" id="btnEnter">Ingresar al Aula</button>
    <span class="btn-back" id="backToRoles"><i class="fa-solid fa-arrow-left"></i> Volver atrás</span>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBynAiyunaie-L49lT_mJ3W7SiQRB9sDVw",
    authDomain: "clases-68cf1.firebaseapp.com",
    projectId: "clases-68cf1",
    storageBucket: "clases-68cf1.firebasestorage.app",
    messagingSenderId: "734322078138",
    appId: "1:734322078138:web:66ddaaab8b05ffe1996d83"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  document.getElementById('chooseTeacher').addEventListener('click', () => {
    window.location.href = "profesor.html";
  });

  document.getElementById('chooseStudent').addEventListener('click', () => {
    const savedName = localStorage.getItem('student_name');
    const savedCourse = localStorage.getItem('student_course');
    const savedList = localStorage.getItem('student_list');

    if (savedName && savedCourse && savedList) {
      window.location.href = "estudiante.html";
      return;
    }

    document.getElementById('detectedAccount').style.display = 'none';
    document.getElementById('registerFields').style.display = 'block';
    document.getElementById('roleScreen').style.setProperty('display', 'none', 'important');
    document.getElementById('registerScreen').style.setProperty('display', 'flex', 'important');
  });

  document.getElementById('btnResetRegister').addEventListener('click', () => {
    localStorage.clear();
    document.getElementById('detectedAccount').style.display = 'none';
    document.getElementById('registerFields').style.display = 'block';
    document.getElementById('studentName').value = "";
    document.getElementById('studentCourse').value = "";
    document.getElementById('studentList').value = "";
  });

  document.getElementById('backToRoles').addEventListener('click', () => {
    document.getElementById('registerScreen').style.setProperty('display', 'none', 'important');
    document.getElementById('roleScreen').style.setProperty('display', 'flex', 'important');
  });

  document.getElementById('btnEnter').addEventListener('click', async () => {
    const savedName = localStorage.getItem('student_name');
    if (savedName) {
      window.location.href = "estudiante.html";
      return;
    }

    const nombre = document.getElementById('studentName').value.trim();
    const curso  = document.getElementById('studentCourse').value;
    const lista  = document.getElementById('studentList').value.trim();

    if(!nombre || !curso || !lista) {
      alert("⚠️ Por favor, llena todos tus campos obligatorios para ingresar.");
      return;
    }

    const userIdLog = `alumno_${lista}_${nombre.replace(/\s+/g, '_')}`;
    const asistenciaIdLog = `asist_${Date.now()}_${lista}`;

    try {
      await setDoc(doc(db, 'usuarios', userIdLog), { 
        nombre, 
        rol: 'alumno', 
        curso, 
        numLista: lista, 
        estado: 'online',
        ultimaActividad: serverTimestamp() 
      }, { merge: true });
      
      await setDoc(doc(db, 'asistencia', asistenciaIdLog), { nombre, rol: 'alumno', curso, numLista: lista, entrada: serverTimestamp(), salida: null });
      
      localStorage.setItem('user_log_id', userIdLog);
      localStorage.setItem('asist_log_id', asistenciaIdLog);
      localStorage.setItem('student_name', nombre);
      localStorage.setItem('student_course', curso);
      localStorage.setItem('student_list', lista);
      
      window.location.href = "estudiante.html";
    } catch (e) {
      alert("Hubo un problema al conectar con el servidor.");
    }
  });
</script>
</body>
</html>
