<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    if (sessionStorage.getItem('admin_verified') !== 'true') {
      alert("⛔ Acceso prohibido. Debes ingresar la contraseña primero.");
      window.location.href = "index.html";
    }
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Control - Administrador</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  
  <style>
    /* Estilos base para el Panel de Administración */
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f1f5f9;
      margin: 0;
      padding: 20px;
      color: #0f172a;
    }
    .admin-container {
      max-width: 1000px;
      margin: 0 auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #f1f5f9;
      padding-bottom: 20px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0;
      font-size: 1.8rem;
      color: #1e1b4b;
    }
    .btn-logout {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-logout:hover {
      background: #dc2626;
    }
    /* Estructura del panel o tablas de alumnos online */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    .card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 15px;
      padding: 20px;
    }
    /* Diseña aquí el resto de tus componentes visuales de administración */
  </style>
</head>
<body>

  <div class="admin-container">
    <header>
      <h1><i class="fa-solid fa-user-shield"></i> Panel de Control del Aula</h1>
      <button class="btn-logout" id="btnLogout"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</button>
    </header>

    <div class="dashboard-grid">
      <div class="card">
        <h3>Alumnos Registrados y Asistencia</h3>
        <p>Aquí se cargará tu lista de alumnos conectados en tiempo real desde Firebase...</p>
        </div>
    </div>
  </div>

  <script type="module">
    // Tu lógica original de Firebase para el panel de administración puede continuar aquí abajo

    // Lógica para cerrar sesión de manera segura
    document.getElementById('btnLogout').addEventListener('click', () => {
      // Borra la llave de acceso para que no puedan volver atrás usando las flechas del navegador
      sessionStorage.removeItem('admin_verified');
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
