<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Control – Administración</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; color: #1f2937; margin: 0; padding: 2rem; }
    .admin-container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
    header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f3f4f6; padding-bottom: 1.5rem; margin-bottom: 2rem; }
    h1 { margin: 0; font-size: 1.5rem; color: #1e1b4b; }
    .btn-back { background: #e5e7eb; border: none; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 500; cursor: pointer; text-decoration: none; color: #4b5563; font-size: 0.9rem; }
    
    .grid-admin { display: grid; grid-template-columns: 1fr; gap: 2rem; }
    @media (min-width: 768px) { .grid-admin { grid-template-columns: 1.2fr 0.8fr; } }
    
    .card-panel { border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.5rem; }
    .card-panel h2 { margin-top: 0; font-size: 1.2rem; color: #374151; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem; }
    
    .student-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; border-bottom: 1px solid #f3f4f6; }
    .student-row:last-child { border-bottom: none; }
    .student-info { display: flex; flex-direction: column; }
    .student-info .name { font-weight: 600; color: #1f2937; font-size: 0.95rem; }
    .student-info .meta { font-size: 0.8rem; color: #6b7280; }
    
    .status-badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
    .status-badge.online { background-color: #d1fae5; color: #065f46; }
    .status-badge.offline { background-color: #f3f4f6; color: #4b5563; }
  </style>
</head>
<body>

<div class="admin-container">
  <header>
    <h1>⚙️ Panel del Administrador</h1>
    <a href="index.html" class="btn-back">⬅️ Volver al Inicio</a>
  </header>

  <div class="grid-admin">
    <div class="card-panel">
      <h2><i class="fa-solid fa-users"></i> Alumnos Registrados y Presencia</h2>
      <div id="usersList">
        <p style="text-align: center; color: #9ca3af;">Cargando lista de alumnos...</p>
      </div>
    </div>
    
    <div class="card-panel">
      <h2><i class="fa-solid fa-clock-rotate-left"></i> Registro de Asistencias</h2>
      <div id="attendanceList" style="max-height: 400px; overflow-y: auto; font-size: 0.85rem; color: #4b5563;">
        <p style="text-align: center; color: #9ca3af;">Cargando historial...</p>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, orderBy, query } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBynAiyunaie-L49lT_mJ3W7SiQRB9sDVw",
    authDomain: "clases-68cf1.firebaseapp.com",
    projectId: "clases-68cf1",
    storageBucket: "clases-68cf1.firebasestorage.app",
    messagingSenderId: "734322078138",
    appId: "1:734322078138:web:66ddaaab8b05ffe1996d83"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const usersList = document.getElementById('usersList');
  const attendanceList = document.getElementById('attendanceList');

  // ESCUCHAR USUARIOS Y DETERMINAR SU ESTADO DE ACTIVIDAD REAL
  onSnapshot(collection(db, 'usuarios'), (snapshot) => {
    if (snapshot.empty) {
      usersList.innerHTML = `<p style="text-align: center; color: #9ca3af;">No hay alumnos registrados.</p>`;
      return;
    }

    usersList.innerHTML = '';
    const ahora = Date.now();

    snapshot.forEach(doc => {
      const d = doc.data();
      if (d.rol === 'alumno') {
        const row = document.createElement('div');
        row.className = 'student-row';

        // Obtener la fecha del último latido de actividad
        const ultimaConexion = d.ultimaActividad?.toDate ? d.ultimaActividad.toDate().getTime() : 0;
        
        // FILTRO DE INACTIVIDAD: si pasaron más de 45 segundos, se considera Offline de verdad
        const estaActivoRealmente = (ahora - ultimaConexion) < 45000; 
        const estadoFinal = (d.estado === 'online' && estaActivoRealmente) ? 'online' : 'offline';

        row.innerHTML = `
          <div class="student-info">
            <span class="name">${d.nombre}</span>
            <span class="meta">${d.curso || 'Sin curso'} | Lista N° ${d.numLista || 'N/A'}</span>
          </div>
          <span class="status-badge ${estadoFinal}">${estadoFinal}</span>
        `;
        usersList.appendChild(row);
      }
    });
  });

  // ESCUCHAR HISTORIAL DE ASISTENCIA
  const qAsist = query(collection(db, 'asistencia'), orderBy('entrada', 'desc'));
  onSnapshot(qAsist, (snapshot) => {
    if (snapshot.empty) {
      attendanceList.innerHTML = `<p style="text-align: center; color: #9ca3af;">No hay registros de asistencia hoy.</p>`;
      return;
    }

    attendanceList.innerHTML = '';
    snapshot.forEach(doc => {
      const d = doc.data();
      let entradaStr = 'N/A';
      let salidaStr  = 'En clase';

      if (d.entrada?.toDate) {
        entradaStr = d.entrada.toDate().toLocaleTimeString('es', {hour: '2-digit', minute:'2-digit'});
      }
      if (d.salida?.toDate) {
        salidaStr = d.salida.toDate().toLocaleTimeString('es', {hour: '2-digit', minute:'2-digit'});
      }

      const row = document.createElement('div');
      row.style.padding = '0.5rem 0';
      row.style.borderBottom = '1px dashed #e5e7eb';
      row.innerHTML = `
        <strong>${d.nombre}</strong> (${d.curso})<br/>
        <span style="color:#10b981;">▶ Entró: ${entradaStr}</span> | 
        <span style="color:#ef4444;">■ Salió: ${salidaStr}</span>
      `;
      attendanceList.appendChild(row);
    });
  });
</script>
</body>
</html>
