<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estudiante – Aula Virtual Premium</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    body {
      font-family: 'Poppins', sans-serif !important;
      background-color: #f3f4f6 !important;
      color: #1f2937 !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    .app-layout {
      max-width: 600px !important;
      margin: 0 auto !important;
      background: #f9fafb !important;
      min-height: 100vh !important;
      box-shadow: 0 0 40px rgba(0,0,0,0.05) !important;
      position: relative !important;
      display: block !important;
    }

    .app-header {
      background: white !important;
      padding: 1.25rem 1.5rem !important;
      border-bottom: 1px solid #e5e7eb !important;
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      position: sticky !important;
      top: 0 !important;
      z-index: 2000 !important;
    }

    .back-link {
      color: #ef4444 !important;
      text-decoration: none !important;
      font-weight: 600 !important;
      font-size: 0.9rem !important;
      display: inline-flex !important;
      align-items: center !important;
      gap: 0.4rem !important;
      cursor: pointer !important;
    }
    
    .app-header h1 { font-size: 1.1rem !important; font-weight: 700 !important; margin: 0 !important; color: #111827 !important; }
    
    .student-info-sub {
      font-size: 0.75rem !important;
      color: #6b7280 !important;
      margin-top: 0.2rem !important;
    }

    .badge-student {
      background: #d1fae5 !important;
      color: #065f46 !important;
      padding: 0.25rem 0.75rem !important;
      border-radius: 9999px !important;
      font-size: 0.8rem !important;
      font-weight: 600 !important;
      display: inline-block !important;
    }

    .status-indicator {
      display: flex !important;
      align-items: center !important;
      gap: 0.4rem !important;
      font-size: 0.8rem !important;
      color: #6b7280 !important;
    }
    .status-dot {
      width: 8px !important;
      height: 8px !important;
      background-color: #d1d5db !important;
      border-radius: 50% !important;
      display: inline-block !important;
    }
    .status-dot.online { background-color: #10b981 !important; box-shadow: 0 0 8px #10b981 !important; }

    .filter-container {
      background: white !important;
      padding: 0.75rem 1rem !important;
      display: flex !important;
      gap: 0.6rem !important;
      overflow-x: auto !important;
      white-space: nowrap !important;
      border-bottom: 1px solid #e5e7eb !important;
      position: sticky !important;
      top: 73px !important;
      z-index: 1900 !important;
      visibility: visible !important;
      opacity: 1 !important;
    }

    .filter-btn {
      background: #e5e7eb !important;
      color: #1f2937 !important;
      border: 1px solid #d1d5db !important;
      padding: 0.5rem 1.2rem !important;
      border-radius: 9999px !important;
      font-family: 'Poppins', sans-serif !important;
      font-size: 0.85rem !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      display: inline-block !important;
      transition: all 0.2s ease !important;
    }
    .filter-btn.active {
      background: #4f46e5 !important;
      color: white !important;
      border-color: #4f46e5 !important;
    }

    .new-post-alert {
      position: fixed !important;
      top: 140px !important;
      left: 50% !important;
      transform: translateX(-50%) translateY(-20px) !important;
      background: #10b981 !important;
      color: white !important;
      padding: 0.6rem 1.2rem !important;
      border-radius: 30px !important;
      font-size: 0.85rem !important;
      font-weight: 600 !important;
      box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3) !important;
      z-index: 1800 !important;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease !important;
      display: flex !important;
      align-items: center !important;
      gap: 0.5rem !important;
    }
    .new-post-alert.visible { opacity: 1 !important; pointer-events: auto !important; transform: translateX(-50%) translateY(0) !important; }

    .feed-area {
      padding: 1.5rem !important;
      display: flex !important;
      flex-direction: column !important;
      gap: 1.2rem !important;
    }

    .post-card {
      background: white !important;
      border-radius: 18px !important;
      padding: 1.5rem !important;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05) !important;
      border: 1px solid #f3f4f6 !important;
      margin-bottom: 1rem !important;
    }

    .post-meta {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      margin-bottom: 0.75rem !important;
    }
    .post-meta .author { font-weight: 600 !important; color: #374151 !important; display: flex !important; align-items: center !important; gap: 0.4rem !important; }
    
    .subject-badge {
      background: #e0e7ff !important;
      color: #4f46e5 !important;
      padding: 0.2rem 0.6rem !important;
      border-radius: 6px !important;
      font-size: 0.75rem !important;
      font-weight: 600 !important;
    }

    .post-text { font-size: 0.98rem !important; line-height: 1.5 !important; color: #4b5563 !important; margin: 0 0 1rem 0 !important; white-space: pre-wrap !important; }
    .post-img { width: 100% !important; max-height: 300px !important; object-fit: cover !important; border-radius: 12px !important; }
    .file-attach-link { display: inline-flex !important; align-items: center !important; gap: 0.5rem !important; color: #4f46e5 !important; font-weight: 500 !important; text-decoration: none !important; }
  </style>
</head>
<body>

<div class="app-layout">

  <header class="app-header">
    <span class="back-link" id="btnLogout">🚪 Salir</span>
    <div>
      <h1 id="headerWelcome">Hola, Estudiante</h1>
      <div class="student-info-sub" id="headerMeta">Cargando datos...</div>
    </div>
    <div class="status-indicator" id="statusIndicator">
      <span class="status-dot" id="dot"></span><span id="statusText">Conectando...</span>
    </div>
  </header>

  <div class="filter-container" id="filterContainer">
    <button class="filter-btn active" data-materia="Todos">✨ Todo</button>
    <button class="filter-btn" data-materia="Generales">📢 Avisos</button>
    <button class="filter-btn" data-materia="Matemáticas">📐 Mat</button>
    <button class="filter-btn" data-materia="Lengua Española">📚 Lengua</button>
    <button class="filter-btn" data-materia="Ciencias Sociales">🌍 Sociales</button>
    <button class="filter-btn" data-materia="Ciencias Naturales">🌱 Naturales</button>
    <button class="filter-btn" data-materia="Cívica">⚖️ Cívica</button>
    <button class="filter-btn" data-materia="Informática">💻 Info</button>
    <button class="filter-btn" data-materia="Artística">🎨 Arte</button>
    <button class="filter-btn" data-materia="Inglés">🗣️ Inglés</button>
    <button class="filter-btn" data-materia="Francés">🥖 Francés</button>
  </div>

  <div class="new-post-alert" id="newAlert">
    <span id="alertText">🔔 Nueva tarea publicada</span>
  </div>

  <main class="feed-area" id="feed">
    <div id="loadingText" style="text-align: center; padding: 3rem; color: #6b7280;">
      Cargando aula virtual...
    </div>
  </main>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, orderBy, query, limit, doc, setDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBynAiyunaie-L49lT_mJ3W7SiQRB9sDVw",
    authDomain: "clases-68cf1.firebaseapp.com",
    projectId: "clases-68cf1",
    storageBucket: "clases-68cf1.firebasestorage.app",
    messagingSenderId: "734322078138",
    appId: "1:734322078138:web:66ddaaab8b05ffe1996d83"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // VALIDACIÓN DE SEGURIDAD: SI NO SE HA REGISTRADO, VOLVER A LA PORTADA
  const savedName = localStorage.getItem('student_name');
  const savedCourse = localStorage.getItem('student_course');
  const savedList = localStorage.getItem('student_list');

  if (!savedName || !savedCourse || !savedList) {
    window.location.href = "index.html";
  } else {
    document.getElementById('headerWelcome').textContent = `Hola, ${savedName.split(' ')[0]} 👋`;
    document.getElementById('headerMeta').textContent = `${savedCourse} | N° Lista: ${savedList}`;
  }

  const feed        = document.getElementById('feed');
  const statusText  = document.getElementById('statusText');
  const dot         = document.getElementById('dot');
  const newAlert    = document.getElementById('newAlert');
  const alertText   = document.getElementById('alertText');
  const filterContainer = document.getElementById('filterContainer');

  let isFirstLoad = true;
  let knownIds = new Set();
  let todasLasPublicaciones = [];
  let materiaSeleccionada = "Todos";

  // BOTÓN DE CERRAR SESIÓN (VOLVER A EMPEZAR DESDE CERO)
  document.getElementById('btnLogout').addEventListener('click', async () => {
    const confirmacion = confirm("¿Quieres cerrar sesión y registrar otro estudiante de cero?");
    if (confirmacion) {
      const uId = localStorage.getItem('user_log_id');
      const aId = localStorage.getItem('asist_log_id');

      // Avisar a Firebase que sale
      if (uId && aId) {
        try {
          await setDoc(doc(db, 'usuarios', uId), { estado: 'offline' }, { merge: true });
          await setDoc(doc(db, 'asistencia', aId), { salida: serverTimestamp() }, { merge: true });
        } catch(e) {}
      }

      // Limpiar memoria y redirigir
      localStorage.clear();
      window.location.href = "index.html";
    }
  });

  try {
    if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
      Notification.requestPermission();
    }
  } catch(e) { console.log(e); }

  newAlert.addEventListener('click', () => {
    materiaSeleccionada = "Todos";
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-materia="Todos"]').classList.add('active');
    renderFeed();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    newAlert.classList.remove('visible');
  });

  filterContainer.addEventListener('click', (e) => {
    if (!e.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    materiaSeleccionada = e.target.getAttribute('data-materia');
    renderFeed();
  });

  const q = query(collection(db, 'publicaciones'), orderBy('timestamp', 'desc'), limit(50));

  onSnapshot(q, (snapshot) => {
    if(dot) dot.className = "status-dot online";
    if(statusText) statusText.textContent = "En línea";

    const currentDocs = snapshot.docs;
    let hayNuevas = false;
    let ultimaMateriaNueva = "Generales";
    let textoCortoNuevo = "";

    if (!isFirstLoad) {
      for (let doc of currentDocs) {
        if (!knownIds.has(doc.id)) {
          hayNuevas = true;
          ultimaMateriaNueva = doc.data().materia || "Generales";
          textoCortoNuevo = doc.data().texto || "";
          break; 
        }
      }
    }

    knownIds = new Set(currentDocs.map(d => d.id));
    todasLasPublicaciones = currentDocs.map(d => ({ id: d.id, ...d.data() }));

    renderFeed(hayNuevas);

    if (hayNuevas) {
      if (window.scrollY > 100) {
        alertText.textContent = `🔔 Nueva tarea en: ${ultimaMateriaNueva}`;
        newAlert.classList.add('visible');
        setTimeout(() => newAlert.classList.remove('visible'), 7000);
      }

      if (document.hidden && "Notification" in window && Notification.permission === "granted") {
        new Notification(`📢 Nueva tarea: ${ultimaMateriaNueva}`, {
          body: textoCortoNuevo.substring(0, 60) + "...",
          icon: "icons/icon-192.png"
        });
      }
    }

    isFirstLoad = false;

  }, (error) => {
    if(statusText) statusText.textContent = "Error de conexión";
    console.error(error);
  });

  function renderFeed(resaltarNuevas = false) {
    const publicacionesFiltradas = todasLasPublicaciones.filter(p => {
      if (materiaSeleccionada === "Todos") return true;
      return (p.materia || "Generales") === materiaSeleccionada;
    });

    if (publicacionesFiltradas.length === 0) {
      feed.innerHTML = `<p style="text-align:center;padding:3rem;color:#6b7280;font-weight:500;">Sin publicaciones en esta materia.</p>`;
      return;
    }

    feed.innerHTML = '';
    publicacionesFiltradas.forEach(p => {
      let time = 'Ahora';
      try {
        if (p.timestamp?.toDate) {
          time = p.timestamp.toDate().toLocaleTimeString('es', {hour: '2-digit', minute:'2-digit'});
        }
      } catch(e) {}

      const card = document.createElement('div');
      card.className = 'post-card';
      
      let mediaHtml = p.archivoUrl ? `<img src="${p.archivoUrl}" class="post-img" alt="Material" onclick="window.open('${p.archivoUrl}', '_blank')"/>` : "";
      let linkHtml = p.archivoUrl ? `<a href="${p.archivoUrl}" target="_blank" class="file-attach-link">⬇️ Descargar Adjunto</a>` : "";

      card.innerHTML = `
        <div class="post-meta">
          <span class="author">👤 ${p.autor || 'Profesor'}</span>
          <span class="subject-badge">${p.materia || 'Generales'}</span>
          <span class="time">⏱️ ${time}</span>
        </div>
        <p class="post-text">${escapeHTML(p.texto || '')}</p>
        ${mediaHtml}
        ${linkHtml}
      `;
      feed.appendChild(card);
    });
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

</body>
</html>
