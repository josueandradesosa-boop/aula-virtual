<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estudiante – Aula Virtual Premium</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    /* Estilos Modernos Coherentes con el Panel del Profesor */
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f3f4f6;
      color: #1f2937;
      margin: 0;
      padding: 0;
    }

    .app-layout {
      max-width: 600px;
      margin: 0 auto;
      background: #f9fafb;
      min-height: 100vh;
      box-shadow: 0 0 40px rgba(0,0,0,0.05);
      position: relative;
    }

    .app-header {
      background: white;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .back-link {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: transform 0.2s;
    }
    .back-link:hover { transform: translateX(-3px); }
    .app-header h1 { font-size: 1.2rem; font-weight: 700; margin: 0; color: #111827; }

    .badge-student {
      background: #d1fae5;
      color: #065f46;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: #6b7280;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background-color: #d1d5db;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.online { background-color: #10b981; box-shadow: 0 0 8px #10b981; }

    /* Contenedor de Filtros Horizontal Desplazable */
    .filter-container {
      background: white;
      padding: 0.75rem 1rem;
      display: flex;
      gap: 0.6rem;
      overflow-x: auto;
      white-space: nowrap;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 69px;
      z-index: 48;
      scrollbar-width: none;
    }
    .filter-container::-webkit-scrollbar { display: none; }

    .filter-btn {
      background: #f3f4f6;
      color: #4b5563;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .filter-btn.active {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
    }

    /* Alerta flotante de nueva tarea */
    .new-post-alert {
      position: fixed;
      top: 140px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
      z-index: 45;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .new-post-alert.visible { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }

    /* Feed y Listado de Asignaciones */
    .feed-area {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .post-card {
      background: white;
      border-radius: 18px;
      padding: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      border: 1px solid #f3f4f6;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
    }

    .post-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
    }
    .post-meta .author { font-weight: 600; color: #374151; display: flex; align-items: center; gap: 0.4rem; }
    .post-meta .time { color: #9ca3af; }

    /* Etiqueta colorida de la Materia */
    .subject-badge {
      background: #e0e7ff;
      color: #4f46e5;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .new-badge {
      background: #fef3c7;
      color: #92400e;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.1rem 0.5rem;
      border-radius: 4px;
      margin-left: 0.5rem;
    }

    .post-text { font-size: 0.98rem; line-height: 1.5; color: #4b5563; margin: 0 0 1rem 0; white-space: pre-wrap; }

    /* Descarga de archivos adjuntos */
    .file-attach-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #f3f4f6;
      padding: 0.6rem 1.2rem;
      border-radius: 12px;
      font-size: 0.88rem;
      color: #4f46e5;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s;
      border: 1px solid #e5e7eb;
    }
    .file-attach-link:hover { background: #e0e7ff; border-color: #c7d2fe; }

    /* Imagen dentro del post */
    .post-img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 12px; margin-bottom: 1rem; border: 1px solid #e5e7eb; cursor: pointer; }

    /* Pantallas de carga y estados vacíos */
    .waiting-screen, .empty-feed {
      text-align: center;
      padding: 5rem 2rem;
      color: #6b7280;
    }
    .big-icon { font-size: 3.5rem; color: #d1d5db; margin-bottom: 1rem; }
    .pulse { animation: alertPulse 2s infinite; }
    @keyframes alertPulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }

    .loading-spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 5rem;
      color: #6b7280;
    }
    .spinner {
      width: 35px;
      height: 35px;
      border: 4px solid rgba(79, 70, 229, 0.1);
      border-left-color: #4f46e5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="app-layout">

  <header class="app-header">
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Inicio</a>
    <h1>Mi Clase</h1>
    <span class="badge-student">Estudiante</span>
    <div class="status-indicator" id="statusIndicator">
      <span class="status-dot" id="dot"></span><span id="statusText">Conectando...</span>
    </div>
  </header>

  <div class="filter-container" id="filterContainer">
    <button class="filter-btn active" data-materia="Todos">✨ Todo</button>
    <button class="filter-btn" data-materia="Generales">📢 Avisos</button>
    <button class="filter-btn" data-materia="Matemáticas">📐 Matemáticas</button>
    <button class="filter-btn" data-materia="Lengua Española">📚 Lengua</button>
    <button class="filter-btn" data-materia="Ciencias Sociales">🌍 Sociales</button>
    <button class="filter-btn" data-materia="Ciencias Naturales">🌱 Naturales</button>
    <button class="filter-btn" data-materia="Cívica">⚖️ Cívica</button>
    <button class="filter-btn" data-materia="Informática">💻 Info</button>
    <button class="filter-btn" data-materia="Artística">🎨 Arte</button>
    <button class="filter-btn" data-materia="Inglés">🗣️ Inglés</button>
    <button class="filter-btn" data-materia="Francés">🥖 Francés</button>
  </div>

  <div class="new-post-alert" id="newAlert">
    <i class="fa-solid fa-bell fa-bounce"></i> <span id="alertText">Nueva tarea publicada</span>
  </div>

  <main class="feed-area" id="feed">
    <div class="loading-spinner">
      <div class="spinner"></div>
      <span>Conectando al aula...</span>
    </div>
  </main>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, orderBy, query, limit }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBynAiyunaie-L49lT_mJ3W7SiQRB9sDVw",
    authDomain: "clases-68cf1.firebaseapp.com",
    projectId: "clases-68cf1",
    storageBucket: "clases-68cf1.firebasestorage.app",
    messagingSenderId: "734322078138",
    appId: "1:734322078138:web:66ddaaab8b05ffe1996d83"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const feed        = document.getElementById('feed');
  const statusText  = document.getElementById('statusText');
  const dot         = document.getElementById('dot');
  const newAlert    = document.getElementById('newAlert');
  const alertText   = document.getElementById('alertText');
  const filterContainer = document.getElementById('filterContainer');

  let isFirstLoad = true;
  let knownIds = new Set();
  let todasLasPublicaciones = [];
  let materiaSeleccionada = "Todos";

  // SOLICITAR PERMISO DE NOTIFICACIONES AL NAVEGADOR
  if ("Notification" in window) {
    if (Notification.permission !== "granted" && Notification.permission !== "denied") {
      Notification.requestPermission();
    }
  }

  newAlert.addEventListener('click', () => {
    materiaSeleccionada = "Todos";
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-materia="Todos"]').classList.add('active');
    renderFeed();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    newAlert.classList.remove('visible');
  });

  filterContainer.addEventListener('click', (e) => {
    if (!e.target.classList.contains('filter-btn')) return;
    
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    
    materiaSeleccionada = e.target.getAttribute('data-materia');
    renderFeed();
  });

  const q = query(collection(db, 'publicaciones'), orderBy('timestamp', 'desc'), limit(50));

  onSnapshot(q, (snapshot) => {
    dot.className = "status-dot online";
    statusText.textContent = "En línea";

    if (snapshot.empty) {
      feed.innerHTML = `
        <div class="waiting-screen">
          <div class="big-icon pulse"><i class="fa-regular fa-clock"></i></div>
          <p style="font-weight: 500; font-size: 1.1rem; color: #4b5563;">Tu pizarra está limpia</p>
          <p style="margin-top:0.25rem; font-size:0.9rem; color: #9ca3af;">Esperando las asignaciones del profesor...</p>
        </div>`;
      isFirstLoad = false;
      todasLasPublicaciones = [];
      return;
    }

    const currentDocs = snapshot.docs;
    let hayNuevas = false;
    let ultimaMateriaNueva = "Generales";
    let textoCortoNuevo = "";

    if (!isFirstLoad) {
      for (let doc of currentDocs) {
        if (!knownIds.has(doc.id)) {
          hayNuevas = true;
          ultimaMateriaNueva = doc.data().materia || "Generales";
          textoCortoNuevo = doc.data().texto || "";
          break; 
        }
      }
    }

    knownIds = new Set(currentDocs.map(d => d.id));
    todasLasPublicaciones = currentDocs.map(d => ({ id: d.id, ...d.data() }));

    renderFeed(hayNuevas);

    // DISPARAR NOTIFICACIONES SI LLEGA ALGO NUEVO
    if (hayNuevas) {
      if (window.scrollY > 100) {
        alertText.textContent = `Nueva tarea en: ${ultimaMateriaNueva}`;
        newAlert.classList.add('visible');
        setTimeout(() => newAlert.classList.remove('visible'), 7000);
      }

      // Notificación nativa si la ventana no está visible en ese momento
      if (document.hidden && "Notification" in window && Notification.permission === "granted") {
        new Notification(`📢 Nueva tarea: ${ultimaMateriaNueva}`, {
          body: textoCortoNuevo.substring(0, 60) + "...",
          icon: "icons/icon-192.png"
        });
      }
    }

    isFirstLoad = false;

  }, () => {
    dot.className = "status-dot";
    statusText.textContent = "Sin conexión";
    feed.innerHTML = `<div class="empty-feed"><div class="empty-icon"><i class="fa-solid fa-satellite-dish"></i></div><p>Sin conexión. Verifica tu acceso a internet.</p></div>`;
  });

  function renderFeed(resaltarNuevas = false) {
    const publicacionesFiltradas = todasLasPublicaciones.filter(p => {
      if (materiaSeleccionada === "Todos") return true;
      const tag = p.materia || "Generales";
      return tag === materiaSeleccionada;
    });

    if (publicacionesFiltradas.length === 0) {
      feed.innerHTML = `
        <div class="waiting-screen">
          <div class="big-icon"><i class="fa-solid fa-folder-open"></i></div>
          <p style="font-weight: 500; font-size: 1rem; color: #6b7280;">Sin publicaciones de ${materiaSeleccionada}</p>
        </div>`;
      return;
    }

    feed.innerHTML = '';
    publicacionesFiltradas.forEach(p => {
      const time = p.timestamp?.toDate
        ? p.timestamp.toDate().toLocaleString('es', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' })
        : 'Ahora';

      const card = document.createElement('div');
      card.className = 'post-card';
      
      let mediaHtml = p.archivoUrl ? `<img src="${p.archivoUrl}" class="post-img" alt="Material" onclick="window.open('${p.archivoUrl}', '_blank')"/>` : "";
      let linkHtml = p.archivoUrl ? `<a href="${p.archivoUrl}" target="_blank" class="file-attach-link"><i class="fa-solid fa-file-arrow-down"></i> Descargar Recurso</a>` : "";

      const tagMateria = p.materia || 'Generales';

      card.innerHTML = `
        <div class="post-meta">
          <span class="author"><i class="fa-solid fa-user-tie"></i> ${p.autor || 'Profesor'} ${resaltarNuevas && isFirstLoad === false ? '<span class="new-badge">Nuevo</span>' : ''}</span>
          <span class="subject-badge">${tagMateria}</span>
          <span class="time"><i class="fa-regular fa-clock"></i> ${time}</span>
        </div>
        <p class="post-text">${escapeHTML(p.texto)}</p>
        ${mediaHtml}
        ${linkHtml}
      `;
      feed.appendChild(card);
    });
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
